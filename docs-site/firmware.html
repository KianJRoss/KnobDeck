<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>KnobDeck | Firmware SDK</title><link rel="stylesheet" href="styles.css"/></head><body><main class="page"><h1>Firmware SDK</h1><p>Use <code>sdk/firmware/qmk_encoder_bridge</code> to adapt new keyboards.</p><p>Recommended event map:</p><ul><li>F13/F14: rotate CW/CCW</li><li>F15/F16: press/release</li><li>F17/F18: long press/double click</li></ul><p>This preserves normal typing + VIA while enabling app gestures.</p><p><a href="index.html">Back</a></p></main></body></html>
