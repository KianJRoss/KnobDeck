name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python_host
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        working-directory: python_host
        run: |
          pyinstaller --noconfirm build/windows/KnobDeck.spec

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnobDeck-portable
          path: python_host/dist/KnobDeck

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        working-directory: python_host
        run: |
          iscc build/windows/installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnobDeck-installer
          path: python_host/dist/installer/*.exe
