name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python_host
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build executable
        working-directory: python_host
        run: |
          pyinstaller --noconfirm build/windows/KnobDeck.spec

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnobDeck-portable
          path: python_host/dist/KnobDeck

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "0.0.0-dev"
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        working-directory: python_host
        run: |
          iscc build/windows/installer.iss /DAppVersion=${{ steps.version.outputs.value }}

      - name: Create portable zip
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: python_host
        shell: pwsh
        run: |
          $zipPath = "dist/KnobDeck-portable-${{ github.ref_name }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/KnobDeck/*" -DestinationPath $zipPath -Force

      - name: Generate release checksums
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: python_host
        shell: pwsh
        run: |
          $installer = Get-ChildItem "dist/installer/*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $zip = Get-Item "dist/KnobDeck-portable-${{ github.ref_name }}.zip"
          $checksumFile = "dist/SHA256SUMS.txt"
          "# KnobDeck checksums for ${{ github.ref_name }}" | Out-File -FilePath $checksumFile -Encoding utf8
          $instHash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLower()
          $zipHash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLower()
          "${instHash}  $($installer.Name)" | Add-Content -Path $checksumFile
          "${zipHash}  $($zip.Name)" | Add-Content -Path $checksumFile

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnobDeck-installer
          path: python_host/dist/installer/*.exe

      - name: Upload checksums artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: KnobDeck-checksums
          path: python_host/dist/SHA256SUMS.txt

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            python_host/dist/installer/*.exe
            python_host/dist/KnobDeck-portable-${{ github.ref_name }}.zip
            python_host/dist/SHA256SUMS.txt
