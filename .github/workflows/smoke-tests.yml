name: smoke-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        working-directory: python_host
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile host sources
        run: |
          python -m compileall python_host/*.py python_host/plugins/*.py python_host/custom_plugins/*.py

      - name: Import core modules
        working-directory: python_host
        run: |
          python -c "import knobdeck_app_qt, knobdeck_app, menu_system, mode_handlers, settings_dialog; print('core imports ok')"
