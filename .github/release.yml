changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "Features"
      labels:
        - enhancement
        - feature
    - title: "Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance"
      labels:
        - chore
        - ci
